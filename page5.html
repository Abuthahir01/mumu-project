<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The First Picture ✨</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #fdf2f4 0%, #eef2f3 100%);
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 95%;
            max-width: 400px; /* Box width-ah control panrom */
        }

        .date-tag {
            background: #ff4d6d;
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }

        /* PHOTO SIZE FIX HERE */
        .polaroid-frame {
            background: white;
            padding: 10px 10px 25px 10px;
            border: 1px solid #eee;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            margin: 15px auto;
            width: 220px; /* Photo size fixed to look neat */
            transform: rotate(-2deg);
            transition: 0.3s ease;
        }

        .polaroid-frame img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            display: block;
        }

        .polaroid-frame:hover {
            transform: rotate(0deg) scale(1.05);
        }

        .caption {
            font-family: 'Great Vibes', cursive;
            margin-top: 10px;
            color: #555;
            font-size: 1.1rem;
        }

        .story-text {
            font-size: 0.85rem;
            line-height: 1.5;
            color: #444;
            margin: 10px 0;
        }

        button {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover { background: #ff758c; transform: scale(1.05); }
    </style>
</head>
<body onload="createHearts()">

    <div class="box">
        <div class="date-tag">JUN 16, 2025</div>
        
        <h1 style="font-family: 'Great Vibes', cursive; font-size: 2rem; margin: 5px 0;">Our First Click 📸</h1>
        
        <p class="story-text">
            Cryptography exam tension oru pakkam...irundalum <br>
            Unexpected-ah anaiku unga kooda meet pana chance kedachadhu anaiku jolly-ah pesitu <br> 
            irundhom andha afternoon!
        </p>

        <div class="polaroid-frame">
            <img src="images/first-pic.jpeg" alt="Our First Memory">
            <div class="caption">Jun 16 @ Canteen</div>
        </div>

        <p class="story-text">
            Manasa vittu pesitu, namma <b>First Pic</b> eduthom! ❤️ <br>
            En life-la marakka mudiyadha day!
        </p>

        <button onclick="next('page6.html')">Ready for Next? 🔜</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
